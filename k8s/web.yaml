---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appk3s-web
  namespace: appk3s
  labels:
    app: appk3s-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appk3s-web
  template:
    metadata:
      labels:
        app: appk3s-web
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/appk3s-web:latest  # replace with your image
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: appk3s-web
  namespace: appk3s
spec:
  selector:
    app: appk3s-web
  ports:
    - port: 80
      targetPort: 80
