---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: appk3s
  namespace: appk3s

---
# ClusterRole: AppK3s needs cluster-wide access to manage apps in any namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: appk3s-manager
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - pods/log
      - services
      - secrets
      - persistentvolumeclaims
      - configmaps
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: appk3s-manager-binding
subjects:
  - kind: ServiceAccount
    name: appk3s
    namespace: appk3s
roleRef:
  kind: ClusterRole
  name: appk3s-manager
  apiGroup: rbac.authorization.k8s.io
