---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: appk3s
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: appk3s
type: Opaque
stringData:
  POSTGRES_USER: appk3s
  POSTGRES_PASSWORD: changeme-in-production
  POSTGRES_DB: appk3s
  DATABASE_URL: postgresql://appk3s:changeme-in-production@postgres:5432/appk3s

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: appk3s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [pg_isready, -U, appk3s]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: appk3s
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
